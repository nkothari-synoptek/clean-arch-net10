apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: digital-inspection
  labels:
    app: api-gateway
    component: gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: https
    protocol: TCP
  sessionAffinity: None
