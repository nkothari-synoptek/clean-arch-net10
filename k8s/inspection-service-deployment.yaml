apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspection-service
  namespace: digital-inspection
  labels:
    app: inspection-service
    component: microservice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inspection-service
  template:
    metadata:
      labels:
        app: inspection-service
        component: microservice
    spec:
      containers:
      - name: inspection-service
        image: myregistry.azurecr.io/inspection-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:80"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: inspection-service-secrets
              key: database-connection-string
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: inspection-service-secrets
              key: redis-connection-string
        - name: ConnectionStrings__ServiceBus
          valueFrom:
            secretKeyRef:
              name: inspection-service-secrets
              key: servicebus-connection-string
        - name: ApplicationInsights__ConnectionString
          valueFrom:
            secretKeyRef:
              name: inspection-service-secrets
              key: appinsights-connection-string
        - name: AzureAd__TenantId
          valueFrom:
            configMapKeyRef:
              name: inspection-service-config
              key: azure-ad-tenant-id
        - name: AzureAd__ClientId
          valueFrom:
            configMapKeyRef:
              name: inspection-service-config
              key: azure-ad-client-id
        - name: ServiceName
          value: "InspectionService"
        - name: ServiceVersion
          value: "1.0.0"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
