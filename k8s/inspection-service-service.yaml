apiVersion: v1
kind: Service
metadata:
  name: inspection-service
  namespace: digital-inspection
  labels:
    app: inspection-service
    component: microservice
spec:
  type: ClusterIP
  selector:
    app: inspection-service
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: None
